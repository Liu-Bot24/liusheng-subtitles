<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>流声字幕</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="side-shell">
      <header class="side-header">
        <div class="brand-block">
          <div class="brand-heading">
            <h1 data-i18n="appName">流声字幕</h1>
            <a class="creator-link" href="https://blog.liu-qi.cn/tools" target="_blank" rel="noopener noreferrer">Created by @liuqi</a>
          </div>
          <p id="pageTitle" data-i18n="appTagline">基于 ASR 与 LLM 的生肉视频字幕生成器</p>
        </div>
        <div class="header-tools">
          <div id="localeSwitch" class="locale-switch" role="group" aria-label="Language">
            <button id="localeEnglish" type="button" class="locale-option" data-locale="en">EN</button>
            <button id="localeChinese" type="button" class="locale-option" data-locale="zh">中文</button>
          </div>
          <span id="status" class="status" role="status" aria-live="polite" data-i18n="statusIdle">待机</span>
        </div>
      </header>

      <nav id="tabsNav" class="tabs" aria-label="Tabs" role="tablist">
        <button id="tabTask" class="tab active" type="button" role="tab" aria-selected="true" aria-controls="taskPanel" data-i18n="tabTask">任务与字幕</button>
        <button id="tabSettings" class="tab" type="button" role="tab" aria-selected="false" aria-controls="settingsPanel" data-i18n="tabSettings">设置</button>
      </nav>

      <section id="taskPanel" class="panel active" role="tabpanel" aria-labelledby="tabTask">
        <section class="candidate-section">
          <div class="section-heading compact">
            <h2 data-i18n="mediaSources">媒体源</h2>
            <button id="refreshCandidates" type="button" class="secondary small-button" data-i18n="refreshSources">刷新源</button>
          </div>
          <div id="candidateSummary" class="job-empty" data-i18n="readingSources">正在读取当前页面媒体源。</div>
          <div id="candidateList" class="candidate-list"></div>
        </section>
        <p id="taskMessage" class="message" aria-live="polite" hidden></p>
        <div class="panel-head">
          <h2 data-i18n="taskTitle">预加载任务</h2>
        </div>
        <div class="task-toolbar">
          <div class="panel-actions">
            <label class="task-source-language">
              <span data-i18n="sourceLanguage">原音频语言</span>
              <select id="sourceLanguage">
                <option value="auto" data-i18n="sourceAuto">自动识别</option>
                <option value="zh" data-i18n="langChinese">中文</option>
                <option value="en" data-i18n="langEnglish">英语</option>
                <option value="ja" data-i18n="langJapanese">日语</option>
                <option value="ko" data-i18n="langKorean">韩语</option>
                <option value="fr" data-i18n="langFrench">法语</option>
                <option value="de" data-i18n="langGerman">德语</option>
                <option value="ru" data-i18n="langRussian">俄语</option>
                <option value="es" data-i18n="langSpanish">西班牙语</option>
                <option value="pt" data-i18n="langPortuguese">葡萄牙语</option>
                <option value="it" data-i18n="langItalian">意大利语</option>
              </select>
            </label>
            <button id="startPreload" type="button" data-i18n="start">开始</button>
            <button id="rerunAsr" type="button" class="secondary" data-i18n="rerunAsr">重新 ASR</button>
            <button id="retryTranslation" type="button" class="secondary" data-i18n="retranslate">重翻译字幕</button>
            <button id="retryPreload" type="button" class="secondary" data-i18n="continueTask">继续</button>
            <button id="cancelPreload" type="button" class="danger" data-i18n="stop">停止</button>
            <button id="clearAudioCache" type="button" class="secondary" data-i18n="clearAudio">清音频缓存</button>
            <button id="refresh" type="button" class="secondary" data-i18n="refresh">刷新</button>
          </div>
        </div>
        <section id="jobStatus" class="job-panel"></section>
        <section class="subtitle-section">
          <div class="section-heading compact">
            <h2 data-i18n="fullSubtitles">完整字幕</h2>
            <div class="subtitle-actions">
              <button id="subtitleOverlayToggle" type="button" class="secondary small-button" aria-pressed="true">浮层开</button>
              <button id="subtitleModeToggle" type="button" class="secondary small-button" aria-pressed="true">译文</button>
              <button id="exportSubtitle" type="button" class="secondary small-button" data-i18n="exportSrt">导出SRT</button>
              <button id="importSubtitle" type="button" class="secondary small-button" data-i18n="importSubtitle">导入</button>
              <button id="clearSubtitleCache" type="button" class="secondary small-button" data-i18n="clearSubtitleCache">清字幕缓存</button>
              <button id="toggleTaskDetails" type="button" class="secondary small-button" hidden data-i18n="taskDetails">展开任务</button>
            </div>
          </div>
          <input id="subtitleImportFile" type="file" accept="application/json,.json,.srt,text/vtt,.vtt,.ass,.ssa" hidden>
          <div id="subtitleNotice" class="subtitle-notice" hidden></div>
          <div id="subtitleList" class="subtitle-list" data-i18n="subtitlePlaceholder">字幕生成后会显示在这里。</div>
        </section>
      </section>

      <section id="settingsPanel" class="panel" role="tabpanel" aria-labelledby="tabSettings">
        <h2 data-i18n="asrSettings">语音识别</h2>
        <div class="profile-row">
          <label>
            <span data-i18n="editingProfile">正在编辑</span>
            <select id="asrProfileId"></select>
          </label>
          <div class="profile-actions">
            <button id="addAsrProfile" type="button" class="secondary small-button" data-i18n="addProfile">新增档案</button>
            <button id="deleteAsrProfile" type="button" class="secondary small-button" data-i18n="deleteProfile">删除档案</button>
          </div>
        </div>
        <label>
          <span data-i18n="profileName">档案名称</span>
          <input id="asrProfileName" type="text" spellcheck="false">
        </label>
        <label>
          <span data-i18n="apiBaseUrl">接口地址</span>
          <input id="asrBaseUrl" type="url" spellcheck="false">
        </label>
        <label>
          <span data-i18n="modelName">模型名称</span>
          <input id="asrModel" type="text" spellcheck="false">
        </label>
        <label>
          <span data-i18n="vadFilter">VAD 过滤</span>
          <select id="asrVadFilter">
            <option value="auto" data-i18n="auto">自动</option>
            <option value="on" data-i18n="forceOn">强制开启（自建）</option>
            <option value="off" data-i18n="off">关闭</option>
          </select>
        </label>
        <label>
          <span data-i18n="apiKey">API 密钥</span>
          <input id="asrApiKey" type="password" spellcheck="false" autocomplete="off">
        </label>
        <p id="asrApiKeyHint" class="settings-hint"></p>

        <h2 data-i18n="translationModel">翻译模型</h2>
        <div class="profile-row">
          <label>
            <span data-i18n="editingProfile">正在编辑</span>
            <select id="llmProfileId"></select>
          </label>
          <div class="profile-actions">
            <button id="addLlmProfile" type="button" class="secondary small-button" data-i18n="addProfile">新增档案</button>
            <button id="deleteLlmProfile" type="button" class="secondary small-button" data-i18n="deleteProfile">删除档案</button>
          </div>
        </div>
        <label>
          <span data-i18n="profileName">档案名称</span>
          <input id="llmProfileName" type="text" spellcheck="false">
        </label>
        <label>
          <span data-i18n="apiFormat">接口格式</span>
          <select id="llmProviderType">
            <option value="openai" data-i18n="openaiFormat">OpenAI 格式</option>
            <option value="anthropic" data-i18n="anthropicFormat">Anthropic 格式</option>
          </select>
        </label>
        <label>
          <span data-i18n="apiBaseUrl">接口地址</span>
          <input id="llmBaseUrl" type="url" spellcheck="false">
        </label>
        <label>
          <span data-i18n="modelName">模型名称</span>
          <input id="llmModel" type="text" spellcheck="false">
        </label>
        <label>
          <span data-i18n="apiKey">API 密钥</span>
          <input id="llmApiKey" type="password" spellcheck="false" autocomplete="off">
        </label>
        <p id="llmApiKeyHint" class="settings-hint"></p>
        <div class="settings-grid">
          <label>
            <span data-i18n="targetLanguage">目标语言</span>
            <select id="targetLanguage">
              <option value="zh-CN" data-i18n="targetChinese">中文</option>
              <option value="en" data-i18n="targetEnglish">英文</option>
              <option value="ja" data-i18n="langJapanese">日语</option>
              <option value="fr" data-i18n="langFrench">法语</option>
              <option value="ko" data-i18n="langKorean">韩语</option>
              <option value="de" data-i18n="langGerman">德语</option>
              <option value="ru" data-i18n="langRussian">俄语</option>
            </select>
          </label>
          <label>
            <span data-i18n="translationWorkers">翻译并发</span>
            <input id="translationWorkers" type="number" min="1" max="6">
          </label>
          <label>
            <span data-i18n="chunkMinutes">字幕分组时长（分钟）</span>
            <input id="chunkMinutes" type="number" min="1" max="60" step="1">
          </label>
        </div>
        <p id="funAsrLongFileHint" class="settings-hint" data-i18n="funAsrLongFileHint" hidden>Fun-ASR 使用长文件链路：系统会按 2 小时以内粗切，完成后进入字幕翻译。</p>
        <h2 data-i18n="subtitleStyle">字幕样式</h2>
        <div class="settings-grid">
          <label>
            <span data-i18n="fontSize">文字大小（像素）</span>
            <input id="subtitleFontSize" type="number" min="18" max="48">
          </label>
          <label>
            <span data-i18n="backgroundOpacity">背景透明度 %</span>
            <input id="subtitleBackgroundOpacity" type="number" min="0" max="95">
          </label>
        </div>
        <button id="saveSettings" type="button" data-i18n="saveSettings">保存设置</button>
        <p id="message" class="message"></p>
      </section>
    </main>
    <script src="subtitle-format.js"></script>
    <script src="subtitle-output.js"></script>
    <script src="subtitle-cache-utils.js"></script>
    <script src="subtitle-cache-store.js"></script>
    <script src="sidepanel-language.js"></script>
    <script src="sidepanel-profiles.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
