<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>浮光译影</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>浮光译影</h1>
        <span id="status" class="status">待机</span>
      </header>

      <section class="mode-grid" aria-label="字幕模式">
        <label class="mode-option">
          <input type="radio" name="mode" value="realtime" checked>
          <span>实时</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode" value="preload">
          <span>预加载</span>
        </label>
      </section>

      <section class="actions">
        <button id="startRealtime" type="button">开始实时字幕</button>
        <button id="stopRealtime" type="button" class="secondary">停止</button>
        <button id="startPreload" type="button">生成字幕轨</button>
      </section>

      <section class="helper">
        <label>
          <span>Helper HTTP</span>
          <input id="helperHttp" type="url" spellcheck="false">
        </label>
        <label>
          <span>Helper WS</span>
          <input id="helperWs" type="url" spellcheck="false">
        </label>
        <button id="saveHelper" type="button" class="secondary">保存</button>
      </section>

      <section>
        <div class="section-heading">
          <h2>媒体候选</h2>
          <button id="refresh" type="button" class="icon-button" title="刷新">↻</button>
        </div>
        <select id="candidates" size="7"></select>
      </section>

      <p id="message" class="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
